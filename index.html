<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Aşk Sorusu 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Arial';
    overflow: hidden;
}

.container {
    text-align: center;
}

h1 {
    color: white;
    font-size: 35px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

button {
    padding: 15px 30px;
    font-size: 20px;
    margin: 15px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

#evet {
    background: #28a745;
    color: white;
}

#hayir {
    background: #dc3545;
    color: white;
    position: absolute;
}

button:hover {
    transform: scale(1.1);
}

.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-800px); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Beni seviyor musun Gozel Ishankuliyeva? 💖</h1>
    <button id="evet" onclick="evet()">Evet 💚</button>
    <button id="hayir" onclick="hayir()">Hayır ❌</button>
</div>

<script>
let sayac = 0;

function evet() {
    document.body.innerHTML = `
        <h1 style="
            font-size:60px;
            color:white;
            text-align:center;
            margin-top:20%;
        ">
        Biliyordum beni sevdiğini 💖✨
        </h1>
    `;
}

function hayir() {
    sayac++;

    let evetBtn = document.getElementById("evet");
    let size = 20 + sayac * 8;
    evetBtn.style.fontSize = size + "px";

    // Hayır butonu kaçıyor 😄
    let hayirBtn = document.getElementById("hayir");
    hayirBtn.style.top = Math.random() * 80 + "%";
    hayirBtn.style.left = Math.random() * 80 + "%";

    // çok basarsa final
    if (sayac >= 6) {
        document.body.innerHTML = `
            <button onclick="evet()" style="
                width:100vw;
                height:100vh;
                font-size:120px;
                background:#28a745;
                color:white;
                border:none;
            ">EVET 💚</button>
        `;
    }
}

// Kalpler uçuş efekti
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 30) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}, 300);
</script>

</body>
</html>
