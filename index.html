<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Aşk Sorusu 💖</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial';
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: white;
            font-size: 35px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            margin: 15px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        #evet {
            background: #28a745;
            color: white;
        }

        #hayir {
            background: #dc3545;
            color: white;
            position: absolute;
        }

        button:hover {
            transform: scale(1.1);
        }

        .heart {
            position: absolute;
            color: red;
            font-size: 20px;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-800px); opacity: 0; }
        }
    </style>
</head>

<body>

<div class="container" id="ana-icerik">
    <h1>Beni seviyor musun Gozel Ishankuliyeva? 💖</h1>
    <button id="evet" onclick="evet()">Evet 💚</button>
    <button id="hayir" onclick="hayir()">Hayır ❌</button>
</div>

<script>
    let sayac = 0;

    // Her hayır butonuna basıldığında çıkacak mesajlar listesi
    const mesajlar = [
        "Emin misin? 🤨",
        "Bence bir daha düşün... 🤔",
        "Bak son kararın mı? 🧐",
        "Hala hayır mı diyorsun? 💔",
        "Üzüyorsun ama... 😢",
        "Cidden mi? 😱",
        "Yol yakınken dön bence! 🚀",
        "Sanki parmağın Evet'e gidiyor? 😉"
    ];

    function evet() {
        document.body.innerHTML = `
            <h1 style="
                font-size:60px;
                color:white;
                text-align:center;
                width: 100%;
                margin-top:20%;
                text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            ">
                Biliyordum beni sevdiğini 💖✨
            </h1>
        `;
        // Evet dedikten sonra da kalpler uçmaya devam etsin
        kalpEfektiBaslat();
    }

    function hayir() {
        let hayirBtn = document.getElementById("hayir");
        let evetBtn = document.getElementById("evet");

        // Mesajı sırayla değiştir
        if (sayac < mesajlar.length) {
            hayirBtn.innerText = mesajlar[sayac];
        } else {
            hayirBtn.innerText = "Kaçışın yok! 😂";
        }

        sayac++;

        // Evet butonunu her hayırda daha da büyüt
        let size = 20 + Math.pow(sayac, 2.8); 
        evetBtn.style.fontSize = size + "px";
        evetBtn.style.padding = (size/2) + "px " + size + "px";

        // Hayır butonu ekranda rastgele bir yere kaçsın
        let x = Math.random() * (window.innerWidth - hayirBtn.clientWidth);
        let y = Math.random() * (window.innerHeight - hayirBtn.clientHeight);
        
        hayirBtn.style.left = x + "px";
        hayirBtn.style.top = y + "px";

        // 9. tıklamadan sonra ekranı tamamen EVET yap
        if (sayac >= 9) {
            document.body.innerHTML = `
                <button onclick="evet()" style="
                    width:100vw;
                    height:100vh;
                    font-size:100px;
                    background:#28a745;
                    color:white;
                    border:none;
                    cursor:pointer;
                ">BAŞKA ŞANSIN YOK: EVET! 💚</button>
            `;
        }
    }

    // Kalpler uçuş efekti fonksiyonu
    function kalpEfektiBaslat() {
        setInterval(() => {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.top = "100vh"; // Ekranın altından başlasın
            heart.style.fontSize = (10 + Math.random() * 30) + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }, 300);
    }

    // Sayfa açıldığında kalp efektini başlat
    kalpEfektiBaslat();
</script>

</body>
</html>
